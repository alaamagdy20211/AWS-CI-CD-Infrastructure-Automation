---
- name: Install PM2 globally
  command: npm install -g pm2
  args:
    creates: /usr/local/bin/pm2
  become: true

- name: Verify PM2 installation
  command: pm2 --version
  register: pm2_version_output
  changed_when: false

- name: Show installed PM2 version
  debug:
    msg: "PM2 installed: {{ pm2_version_output.stdout }}"