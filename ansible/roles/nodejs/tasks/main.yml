- name: Install prerequisite packages
  yum:
    name:
      - curl
      - gnupg2
    state: present
  become: true

- name: Download NodeSource RPM setup script
  get_url:
    url: "https://rpm.nodesource.com/setup_{{ nodejs_major_version }}.x"
    dest: /tmp/nodesource_setup.sh
    mode: "0755"
  become: true

- name: Run NodeSource RPM setup script (adds the yum repo)
  command: bash /tmp/nodesource_setup.sh
  become: true
  register: nodesource_setup
  changed_when: "'Repository configured' in nodesource_setup.stdout or true"

  - name: Enable nodejs 18
  shell: amazon-linux-extras enable nodejs18

- name: Clean yum metadata
  command: yum clean metadata

- name: Install Node.js
  yum:
    name: nodejs
    state: present

- name: Verify Node.js installation
  command: node --version
  register: node_version_output
  changed_when: false

- name: Show installed Node.js version
  debug:
    msg: "Node.js installed: {{ node_version_output.stdout }}"

- name: Verify npm installation
  command: npm --version
  register: npm_version_output
  changed_when: false

- name: Show installed npm version
  debug:
    msg: "npm installed: {{ npm_version_output.stdout }}"