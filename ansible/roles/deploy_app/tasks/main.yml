---
- name: Install prerequisite packages
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  become: true

- name: Add NodeSource GPG key
  apt_key:
    url: "https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key"
    state: present
  become: true

- name: Add NodeSource apt repository
  apt_repository:
    repo: "deb https://deb.nodesource.com/node_{{ nodejs_major_version }}.x nodistro main"
    state: present
  become: true

- name: Install Node.js
  apt:
    name: nodejs
    state: present
    update_cache: true
  become: true

- name: Verify Node.js installation
  command: node --version
  register: node_version_output
  changed_when: false

- name: Show installed Node.js version
  debug:
    msg: "Node.js installed: {{ node_version_output.stdout }}"

- name: Verify npm installation
  command: npm --version
  register: npm_version_output
  changed_when: false

- name: Show installed npm version
  debug:
    msg: "npm installed: {{ npm_version_output.stdout }}"